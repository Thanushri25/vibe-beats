<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign Up — VibeBeats</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="center-wrap">
    <h2 class="form-title">Create Account</h2>

    <form id="signupForm" class="form-box">
      <input type="text" id="signupUsername" placeholder="Username" required />
      <input type="email" id="signupEmail" placeholder="Email" required />
      <input type="password" id="signupPassword" placeholder="Password" required />

      <button type="submit" class="btn primary">Sign Up</button>
      <button type="button" class="btn ghost" onclick="location.href='index.html'">Back</button>

      <p class="muted">Already have an account? <a href="login.html">Login</a></p>
    </form>
  </div>

  <script src="signup.js"></script>
</body>
</html>
