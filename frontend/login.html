<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — VibeBeats</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="center-wrap">
    <h2 class="form-title">Login</h2>

    <form id="loginForm" class="form-box">
      <input type="email" id="loginEmail" placeholder="Email" required />
      <input type="password" id="loginPassword" placeholder="Password" required />

      <button type="submit" class="btn primary">Login</button>
      <button type="button" class="btn ghost" onclick="location.href='index.html'">Back</button>

      <p class="muted">Don't have an account? <a href="signup.html">Sign up</a></p>
    </form>
  </div>

  <script src="login.js"></script>
</body>
</html>
